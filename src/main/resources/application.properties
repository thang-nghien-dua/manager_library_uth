# 1. Database Connection (Docker MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/quan_ly_thu_vien?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root_password

# 2. JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Naming Strategy Standard for Spring Boot
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# 3. Database Platform
spring.jpa.database=mysql

# 4. Actuator Management Endpoints
management.endpoints.web.exposure.include=*
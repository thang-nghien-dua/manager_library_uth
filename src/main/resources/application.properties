spring.datasource.url=jdbc:mysql://localhost:3307/quan_ly_thu_vien?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root


# 2. Cấu hình tự sinh database
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show.sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. CHÚ Ý: Sửa chữ "sprint" viết sai chính tả thành "spring"
spring.jpa.database=mysql
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 4. Các cấu hình quản lý hệ thống
management.endpoints.web.exposure.include=*
management.endpoints.web.exposure.exclude=shutdown
management.info.contrib.custom=true
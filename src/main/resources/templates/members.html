<!-- Main Content Area -->

<!-- Member Modal -->
<div id="member-modal" class="fixed inset-0 bg-on-background/50 backdrop-blur-sm z-[100] hidden items-center justify-center p-md">
    <div class="bg-surface rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
        <div class="px-lg py-md border-b border-outline/20 flex justify-between items-center bg-surface-container-low">
            <h3 id="modal-title" class="font-headline-sm text-headline-sm text-on-surface">Add New Member</h3>
            <button type="button" onclick="closeMemberModal()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-outline/10 text-outline transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <form id="member-form" class="p-lg space-y-md">
            <div>
                <label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Full Name *</label>
                <input id="m-name" required type="text" class="w-full px-md py-sm rounded-xl border border-outline/20 bg-white focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-body-md" placeholder="e.g. Nguyen Van A">
            </div>
            <div>
                <label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Email Address *</label>
                <input id="m-email" required type="email" class="w-full px-md py-sm rounded-xl border border-outline/20 bg-white focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-body-md" placeholder="email@example.com">
            </div>
            <div>
                <label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Phone Number</label>
                <input id="m-phone" type="text" class="w-full px-md py-sm rounded-xl border border-outline/20 bg-white focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-body-md" placeholder="+84...">
            </div>
            <div class="pt-md flex gap-sm justify-end">
                <button type="button" onclick="closeMemberModal()" class="px-lg py-sm rounded-xl font-label-md text-label-md text-on-surface-variant hover:bg-surface-container transition-colors">Cancel</button>
                <button type="submit" class="px-lg py-sm rounded-xl font-label-md text-label-md bg-primary text-white shadow-md hover:-translate-y-px hover:shadow-lg transition-all">Save Member</button>
            </div>
        </form>
    </div>
</div>

    <script>
        let isEditing = false;
        let currentMemberId = null;

        function openMemberModal(member = null) {
            const modal = document.getElementById('member-modal');
            const form = document.getElementById('member-form');
            const title = document.getElementById('modal-title');
            
            if (member) {
                isEditing = true;
                currentMemberId = member.memberId;
                title.textContent = 'Edit Member';
                document.getElementById('m-name').value = member.name || '';
                document.getElementById('m-email').value = member.email || '';
                document.getElementById('m-phone').value = member.phoneNumber || '';
            } else {
                isEditing = false;
                currentMemberId = null;
                title.textContent = 'Add New Member';
                form.reset();
            }
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeMemberModal() {
            const modal = document.getElementById('member-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        async function saveMember(event) {
            event.preventDefault();
            const token = localStorage.getItem('accessToken');
            const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
            
            const params = new URLSearchParams();
            params.append('name', document.getElementById('m-name').value);
            params.append('email', document.getElementById('m-email').value);
            params.append('phoneNumber', document.getElementById('m-phone').value);

            const url = isEditing ? `/members/${currentMemberId}` : `/members`;
            const method = isEditing ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        ...headers,
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: params
                });

                if (response.ok) {
                    closeMemberModal();
                    fetchMembers();
                } else {
                    alert('Failed to save member. ' + await response.text());
                }
            } catch (err) {
                console.error('Error saving member:', err);
                alert('An error occurred while saving.');
            }
        }

        async function deleteMember(id) {
            if (!confirm('Are you sure you want to delete this member?')) return;
            
            const token = localStorage.getItem('accessToken');
            const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

            try {
                const response = await fetch(`/members/${id}`, {
                    method: 'DELETE',
                    headers: headers
                });

                if (response.ok) {
                    fetchMembers();
                } else {
                    alert('Failed to delete member. ' + await response.text());
                }
            } catch (err) {
                console.error('Error deleting member:', err);
                alert('An error occurred while deleting.');
            }
        }

        let allMembersData = [];

        async function fetchMembers() {
            const token = localStorage.getItem('accessToken');
            const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

            try {
                const response = await fetch('/members', { headers });
                if (response.ok) {
                    allMembersData = await response.json();
                    renderMembers(allMembersData);
                }
            } catch (err) {
                console.error("Failed to load members:", err);
            }
        }

        function filterMembers(query) {
            const q = query.toLowerCase();
            const filtered = allMembersData.filter(m => 
                (m.name || '').toLowerCase().includes(q) || 
                (m.email || '').toLowerCase().includes(q) || 
                String(m.memberId).includes(q)
            );
            renderMembers(filtered);
        }

        function renderMembers(members) {
            const grid = document.getElementById('members-grid');
            grid.innerHTML = '';
            
            members.forEach((member, index) => {
                const initials = (member.name || 'UN').split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const memberJson = JSON.stringify(member).replace(/"/g, '&quot;');
                
                // Card lock state stored in localStorage for demo (in production use backend field)
                const lockKey = 'member_locked_' + member.memberId;
                const isLocked = localStorage.getItem(lockKey) === 'true';
                const statusBadge = isLocked
                    ? `<span class="inline-flex items-center gap-1 bg-error/10 text-error text-xs font-bold px-2 py-1 rounded-full"><span class="w-1.5 h-1.5 rounded-full bg-error"></span>Tháº» bá»‹ khĂ³a</span>`
                    : `<span class="inline-flex items-center gap-1 bg-secondary/10 text-secondary text-xs font-bold px-2 py-1 rounded-full"><span class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse"></span>Tháº» hoáº¡t Ä‘á»™ng</span>`;

                grid.innerHTML += `
                    <div class="glass-card p-lg rounded-2xl shadow-sm hover:shadow-xl hover:translate-y-[-4px] transition-all duration-300 group cursor-pointer relative overflow-hidden" style="animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) both; animation-delay: ${index * 50}ms">
                        <div class="absolute top-0 right-0 w-24 h-24 bg-primary/5 rounded-full -mr-12 -mt-12 group-hover:scale-150 transition-transform duration-500"></div>
                        
                        <!-- Action Buttons -->
                        <div class="absolute top-md right-md flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-20">
                            <button onclick="openMemberModal(${memberJson}); event.stopPropagation();" class="w-8 h-8 rounded-full bg-surface hover:bg-primary hover:text-white flex items-center justify-center text-primary shadow-md transition-colors" title="Sá»­a">
                                <span class="material-symbols-outlined text-[16px]">edit</span>
                            </button>
                            <button onclick="toggleMemberCard(${member.memberId}); event.stopPropagation();" class="w-8 h-8 rounded-full bg-surface flex items-center justify-center shadow-md transition-colors ${isLocked ? 'hover:bg-secondary hover:text-white text-secondary' : 'hover:bg-error hover:text-white text-error'}" title="${isLocked ? 'Má»Ÿ khĂ³a tháº»' : 'KhĂ³a tháº»'}">
                                <span class="material-symbols-outlined text-[16px]">${isLocked ? 'lock_open' : 'lock'}</span>
                            </button>
                            <button onclick="deleteMember(${member.memberId}); event.stopPropagation();" class="w-8 h-8 rounded-full bg-surface hover:bg-error hover:text-white flex items-center justify-center text-error shadow-md transition-colors" title="XĂ³a">
                                <span class="material-symbols-outlined text-[16px]">delete</span>
                            </button>
                        </div>

                        <div class="flex items-center gap-md mb-md relative z-10">
                            <div class="w-14 h-14 rounded-2xl bg-primary flex items-center justify-center text-white font-headline-sm text-headline-sm shadow-md">
                                ${initials}
                            </div>
                            <div>
                                <h3 class="font-headline-sm text-headline-sm text-on-background group-hover:text-primary transition-colors">${member.name}</h3>
                                <p class="text-label-sm font-label-sm text-outline">ID: #${member.memberId}</p>
                            </div>
                        </div>
                        <div class="mb-md">${statusBadge}</div>
                        <div class="space-y-sm mb-md relative z-10">
                            <div class="flex items-center gap-sm text-on-surface-variant">
                                <span class="material-symbols-outlined text-[18px]">mail</span>
                                <span class="text-body-sm font-body-sm truncate">${member.email || 'N/A'}</span>
                            </div>
                            <div class="flex items-center gap-sm text-on-surface-variant">
                                <span class="material-symbols-outlined text-[18px]">phone</span>
                                <span class="text-body-sm font-body-sm">${member.phoneNumber || 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        
        function toggleMemberCard(memberId) {
            const lockKey = 'member_locked_' + memberId;
            const isLocked = localStorage.getItem(lockKey) === 'true';
            localStorage.setItem(lockKey, (!isLocked).toString());
            // Show toast
            const msg = !isLocked ? 'ÄĂ£ khĂ³a tháº» mÆ°á»£n!' : 'ÄĂ£ má»Ÿ khĂ³a tháº» mÆ°á»£n!';
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 right-6 z-[300] ${!isLocked ? 'bg-error' : 'bg-secondary'} text-white px-6 py-3 rounded-xl shadow-xl font-medium text-sm flex items-center gap-2`;
            toast.innerHTML = `<span class="material-symbols-outlined text-sm">${!isLocked ? 'lock' : 'lock_open'}</span> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
            fetchMembers();
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchMembers();
            document.getElementById('member-form').addEventListener('submit', saveMember);
        });

        // Add CSS keyframes for fadeUp
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeUp {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);
    </script>

<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ | Boooks</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-background": "#111c2d",
                        "surface-container": "#e7eeff",
                        "surface-container-highest": "#d8e3fb",
                        "on-surface-variant": "#464555",
                        "primary": "#3525cd",
                        "surface": "#f9f9ff",
                        "on-surface": "#111c2d",
                        "on-primary": "#ffffff",
                        "secondary": "#006a61",
                        "error": "#ba1a1a",
                        "outline": "#777587"
                    },
                    fontFamily: {
                        "display-lg": ["Outfit"],
                        "body-md": ["Inter"],
                        "headline-md": ["Outfit"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at top left, #f0f3ff, #f9f9ff 50%, #e2dfff 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(119, 117, 135, 0.2);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            outline: none;
        }
        .material-symbols-outlined {
            vertical-align: middle;
        }
        .book-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .book-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="font-body-md text-on-surface">

    <!-- Top Navigation -->
    <header class="fixed top-0 left-0 w-full h-20 bg-white/70 backdrop-blur-md border-b border-white/20 shadow-sm flex items-center justify-between px-8 z-40">
        <div class="flex items-center gap-4">
            <h1 class="font-display-lg text-3xl font-bold text-primary tracking-tight">Boooks</h1>
            <nav class="hidden md:flex ml-8 gap-6">
                <a href="/user/home" class="text-primary font-semibold border-b-2 border-primary py-1">Khám phá</a>
                <a href="/user/history" class="text-on-surface-variant hover:text-primary py-1 transition-colors">Lịch sử mượn</a>
            </nav>
        </div>
        
        <div class="flex items-center gap-6">
            <div class="relative w-80 hidden md:block">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
                <input id="search-input" oninput="filterBooks(this.value)" class="glass-input w-full pl-12 pr-4 py-2.5 rounded-full font-body-md text-sm" placeholder="Tìm kiếm tựa sách, tác giả..." type="text">
            </div>
            
            <div class="relative group cursor-pointer">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold">
                        <span id="user-initial">U</span>
                    </div>
                    <span id="user-name-display" class="font-semibold text-on-surface hidden sm:block">User</span>
                </div>
                <!-- Dropdown -->
                <div class="absolute right-0 mt-2 w-48 glass-card rounded-xl shadow-lg border border-white/30 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
                    <a href="/user/profile" class="block px-4 py-3 text-sm text-on-surface hover:bg-white/50 rounded-t-xl"><span class="material-symbols-outlined mr-2 text-sm">person</span> Hồ sơ của tôi</a>
                    <a href="/user/history" class="block px-4 py-3 text-sm text-on-surface hover:bg-white/50"><span class="material-symbols-outlined mr-2 text-sm">history</span> Lịch sử mượn</a>
                    <a href="#" onclick="logout()" class="block px-4 py-3 text-sm text-error hover:bg-error/10 rounded-b-xl"><span class="material-symbols-outlined mr-2 text-sm">logout</span> Đăng xuất</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-28 pb-12 px-8 max-w-7xl mx-auto">
        <section class="mb-12 text-center md:text-left">
            <h2 class="font-headline-md text-4xl font-bold text-on-background mb-2">Thư viện số của bạn</h2>
            <p class="text-on-surface-variant text-lg">Khám phá hàng ngàn tựa sách hấp dẫn</p>
        </section>

        <!-- Categories / Filters -->
        <div class="flex flex-wrap gap-3 mb-8" id="category-filters">
            <button onclick="filterByGenre('')" class="px-5 py-2 rounded-full bg-primary text-white text-sm font-semibold transition-colors filter-btn">Tất cả</button>
            <button onclick="filterByGenre('Tiểu thuyết')" class="px-5 py-2 rounded-full glass-card hover:bg-white/90 text-on-surface text-sm font-semibold transition-colors filter-btn">Tiểu thuyết</button>
            <button onclick="filterByGenre('Khoa học')" class="px-5 py-2 rounded-full glass-card hover:bg-white/90 text-on-surface text-sm font-semibold transition-colors filter-btn">Khoa học</button>
            <button onclick="filterByGenre('Kinh tế')" class="px-5 py-2 rounded-full glass-card hover:bg-white/90 text-on-surface text-sm font-semibold transition-colors filter-btn">Kinh tế</button>
        </div>

        <!-- Book Grid -->
        <div id="book-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <!-- Rendered by JS -->
        </div>

    </main>

    <script>
        let allBooks = [];
        let currentGenre = '';
        let searchQuery = '';

        document.addEventListener('DOMContentLoaded', () => {
            const username = localStorage.getItem('username');
            if(username) {
                document.getElementById('user-name-display').textContent = username;
                document.getElementById('user-initial').textContent = username.charAt(0).toUpperCase();
            }
            fetchBooks();
        });

        async function fetchBooks() {
            const token = localStorage.getItem('accessToken');
            const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

            try {
                const response = await fetch('/books', { headers });
                if (response.ok) {
                    allBooks = await response.json();
                    renderBooks();
                    extractGenres();
                } else if(response.status === 401 || response.status === 403) {
                    window.location.href = '/';
                }
            } catch (err) {
                console.error("Error fetching books:", err);
            }
        }

        function extractGenres() {
            const genres = new Set();
            allBooks.forEach(b => { if(b.genre) genres.add(b.genre); });
            
            const filterContainer = document.getElementById('category-filters');
            filterContainer.innerHTML = `<button onclick="filterByGenre('')" class="px-5 py-2 rounded-full bg-primary text-white text-sm font-semibold transition-colors filter-btn" data-genre="">Tất cả</button>`;
            
            genres.forEach(g => {
                filterContainer.innerHTML += `<button onclick="filterByGenre('${g}')" class="px-5 py-2 rounded-full glass-card hover:bg-white/90 text-on-surface text-sm font-semibold transition-colors filter-btn" data-genre="${g}">${g}</button>`;
            });
            updateFilterButtons();
        }

        function filterByGenre(genre) {
            currentGenre = genre;
            updateFilterButtons();
            renderBooks();
        }

        function filterBooks(query) {
            searchQuery = query.toLowerCase();
            renderBooks();
        }

        function updateFilterButtons() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.dataset.genre === currentGenre || (currentGenre === '' && !btn.dataset.genre)) {
                    btn.className = "px-5 py-2 rounded-full bg-primary text-white text-sm font-semibold transition-colors filter-btn";
                } else {
                    btn.className = "px-5 py-2 rounded-full glass-card hover:bg-white/90 text-on-surface text-sm font-semibold transition-colors filter-btn";
                }
            });
        }

        function renderBooks() {
            const grid = document.getElementById('book-grid');
            grid.innerHTML = '';

            let filtered = allBooks;
            if(currentGenre) {
                filtered = filtered.filter(b => b.genre === currentGenre);
            }
            if(searchQuery) {
                filtered = filtered.filter(b => 
                    (b.title || '').toLowerCase().includes(searchQuery) || 
                    (b.author || '').toLowerCase().includes(searchQuery)
                );
            }

            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-on-surface-variant">Không tìm thấy cuốn sách nào.</div>`;
                return;
            }

            filtered.forEach(book => {
                const coverImg = book.coverImage || 'https://via.placeholder.com/150x220?text=No+Cover';
                const available = book.quantityAvailable > 0;
                const statusBadge = available 
                    ? `<span class="absolute top-2 right-2 bg-secondary text-white text-xs px-2 py-1 rounded-full shadow-md font-semibold">Còn sách</span>`
                    : `<span class="absolute top-2 right-2 bg-error text-white text-xs px-2 py-1 rounded-full shadow-md font-semibold">Hết sách</span>`;

                grid.innerHTML += `
                    <div class="glass-card rounded-2xl overflow-hidden book-card flex flex-col cursor-pointer" onclick="window.location.href='/user/book-details?id=${book.bookId}'">
                        <div class="relative w-full aspect-[2/3] bg-surface-container-highest overflow-hidden">
                            <img src="${coverImg}" alt="${book.title}" class="w-full h-full object-cover">
                            ${statusBadge}
                        </div>
                        <div class="p-4 flex flex-col flex-1">
                            <h3 class="font-bold text-on-surface text-base line-clamp-2 mb-1">${book.title}</h3>
                            <p class="text-on-surface-variant text-sm mb-2">${book.author || 'Đang cập nhật'}</p>
                            <div class="mt-auto flex justify-between items-center">
                                <span class="bg-surface-container-highest text-primary text-xs px-2 py-1 rounded-md font-medium">${book.genre || 'Khác'}</span>
                                <div class="flex items-center text-outline text-sm">
                                    <span class="material-symbols-outlined text-[16px] mr-1">star</span> 4.5
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }
    </script>
</body>
</html>

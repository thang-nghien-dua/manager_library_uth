<style>

        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(13, 148, 136, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(79, 70, 229, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(13, 148, 136, 0.1) 0px, transparent 50%);
            background-color: #f9f9ff;
        }

        .dynamic-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: move 20s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 50px) scale(1.1); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.05), 0 8px 10px -6px rgba(79, 70, 229, 0.05);

<!-- Login Form -->

<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">

</div>
</div>
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
                            lock
                        </span>
<input class="w-full bg-white/60 border border-outline-variant rounded-lg py-md pl-[48px] pr-md font-body-md text-body-md text-on-background focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-background transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between">
<label class="flex items-center cursor-pointer group">

<span class="ml-sm font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-background transition-colors">Remember me</span>

<script>
        // Micro-interactions and effects
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const glassCard = document.querySelector('.glass-card');

            // Subtle parallax effect on mouse move
            window.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                glassCard.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });

            // Entry animation
            glassCard.style.opacity = '0';
            glassCard.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                glassCard.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                glassCard.style.opacity = '1';
                glassCard.style.transform = 'translateY(0) rotateY(0) rotateX(0)';
            }, 100);

            // Button loading state and actual backend login
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = form.querySelector('button[type="submit"]');
                const originalContent = btn.innerHTML;
                
                const username = form.username.value;
                const password = form.password.value;
                
                btn.disabled = true;
                btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Processing...`;
                
                try {
                    const response = await fetch('/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'username': username,
                            'password': password
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        localStorage.setItem('accessToken', data.accessToken);
                        if (data.refreshToken) {
                            localStorage.setItem('refreshToken', data.refreshToken);
                        }
                        
                        btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Welcome back!`;
                        btn.classList.replace('bg-primary', 'bg-secondary');
                        glassCard.style.transform = 'scale(1.02)';
                        
                        setTimeout(() => {
                            window.location.href = '/dashboard';
                        }, 1000);
                    } else {
                        throw new Error('Invalid username or password');
                    }
                } catch (error) {
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    alert('Login Failed: ' + error.message);
                }
            });

            // Password visibility toggle
            const togglePass = document.querySelector('button[type="button"]');
            const passInput = document.getElementById('password');
            togglePass.addEventListener('click', () => {
                const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passInput.setAttribute('type', type);
                togglePass.querySelector('span').textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });
        });
    </script>
</body></html>

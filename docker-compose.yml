version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: library-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: quan_ly_thu_vien
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./insertdata.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  app:
    build: .
    container_name: library-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
    depends_on:
      - db
    volumes:
      - app_uploads:/app/uploads
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: library-phpmyadmin
    ports:
      - "8082:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:
  app_uploads:
